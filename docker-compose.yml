name: miniclaude

services:
  postgres:
    image: postgres:16.4-bookworm
    user: "999:999"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniclaude}
      POSTGRES_USER: ${POSTGRES_USER:-miniclaude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_ADDRESS: 0.0.0.0
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-miniclaude}
      DATABASE_USERNAME: ${POSTGRES_USER:-miniclaude}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      DATABASE_DRIVER: org.postgresql.Driver
      PLATFORM_API_KEY: ${PLATFORM_API_KEY:?set PLATFORM_API_KEY in .env}
      PLATFORM_ORCHESTRATOR: local
      PLATFORM_ALLOWED_WORKSPACES: /workspace
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      MOONSHOT_BASE_URL: ${MOONSHOT_BASE_URL:-https://api.moonshot.cn/v1}
      MINI_CLAUDE_MODEL: ${MINI_CLAUDE_MODEL:-kimi-k2.6}
    volumes:
      - workspace_data:/workspace
    tmpfs:
      - /tmp
    read_only: true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  web:
    build:
      context: ./web-console
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8088}:8080"
    tmpfs:
      - /tmp
    read_only: true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

volumes:
  postgres_data:
  workspace_data:
